<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Roadmap  OXYCORP</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    .roadmap-hero { padding: 7rem 0 4rem; }
    .roadmap-layout { display: grid; grid-template-columns: 260px 1fr; gap: 3rem; }

    /* ── SIDEBAR ── */
    .road-sidebar { position: sticky; top: 90px; align-self: start; }
    .sidebar-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.5rem; margin-bottom: 1.2rem; }
    .sidebar-section h4 { font-family: var(--font-m); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 1rem; }

    .phase-nav { display: flex; flex-direction: column; gap: 0.4rem; }
    .phase-nav-item {
      font-family: var(--font-b); font-size: 0.85rem; font-weight: 300;
      padding: 0.55rem 0.8rem; border-radius: var(--r); cursor: pointer;
      color: var(--muted); border: 1px solid transparent; transition: all 0.2s;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .phase-nav-item:hover { background: var(--surface2); color: var(--text); }
    .phase-nav-item.active { background: var(--gold-dim); border-color: var(--border); color: var(--gold); }
    .phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .goal-input { margin-bottom: 1rem; }
    .goal-input label { font-family: var(--font-m); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); display: block; margin-bottom: 0.4rem; }
    .goal-input select { font-size: 0.82rem; padding: 0.55rem 0.8rem; }

    /* ── TIMELINE ── */
    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, var(--gold), var(--teal), var(--violet));
    }
    .phase-block { margin-bottom: 3.5rem; animation: fadeUp 0.5s ease; }
    .phase-header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
      position: relative;
    }
    .phase-header::before {
      content: ''; position: absolute; left: -2.5rem; width: 14px; height: 14px;
      border-radius: 50%; border: 3px solid var(--gold); background: var(--bg); flex-shrink: 0;
      top: 50%; transform: translateY(-50%);
    }
    .phase-block:nth-child(2) .phase-header::before { border-color: var(--teal); }
    .phase-block:nth-child(3) .phase-header::before { border-color: var(--violet); }
    .phase-num {
      font-family: var(--font-m); font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--muted);
    }
    .phase-title { font-family: var(--font-d); font-size: 2rem; font-weight: 600; }
    .phase-period { font-family: var(--font-m); font-size: 0.68rem; color: var(--gold); background: var(--gold-dim); padding: 0.3rem 0.8rem; border-radius: 2px; border: 1px solid var(--border); }

    .milestones { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .milestone {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 1.3rem; position: relative; overflow: hidden;
      transition: all 0.25s; cursor: pointer;
    }
    .milestone:hover { transform: translateY(-2px); border-color: rgba(200,168,75,0.4); }
    .milestone.done { border-color: rgba(29,228,180,0.4); }
    .milestone.done::before { content: '✓'; position: absolute; top: 0.8rem; right: 0.9rem; color: var(--teal); font-family: var(--font-m); font-size: 0.75rem; }
    .milestone-icon { font-size: 1.4rem; margin-bottom: 0.7rem; }
    .milestone-title { font-family: var(--font-d); font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
    .milestone-desc { color: var(--muted); font-size: 0.82rem; line-height: 1.65; }
    .milestone-kpi {
      margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border);
      font-family: var(--font-m); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--gold);
    }

    .actions-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .action-item {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.8rem 1rem; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
    }
    .action-item:hover { border-color: rgba(200,168,75,0.35); }
    .action-item.checked { text-decoration: line-through; color: var(--muted); }
    .action-check {
      width: 18px; height: 18px; border: 1px solid var(--border); border-radius: 3px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; transition: all 0.2s;
    }
    .action-item.checked .action-check { background: var(--teal); border-color: var(--teal); color: #000; }

    /* Revenue target bar */
    .rev-target { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.5rem; margin-top: 1.5rem; }
    .rev-target-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    .rev-target-label { font-family: var(--font-m); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .rev-target-val { font-family: var(--font-d); font-size: 1.5rem; font-weight: 700; color: var(--gold); }

    @media (max-width: 900px) {
      .roadmap-layout { grid-template-columns: 1fr; }
      .road-sidebar { position: static; }
      .milestones { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <section class="roadmap-hero">
      <div class="container">
        <h1>Your Career <em>Roadmap</em></h1>
        <p style="color:var(--muted);max-width:560px;margin-top:1rem;">
          A personalised 36-month career roadmap built for helping you check off milestones as you grow.
        </p>
      </div>
    </section>

    <div class="container" style="padding-bottom:6rem;">
      <div class="roadmap-layout">
        <!-- SIDEBAR -->
        <aside class="road-sidebar">
          <div class="sidebar-section">
            <h4>Customise Roadmap</h4>
            <div class="goal-input">
              <label>Career Goal</label>
              <select onchange="updateRoadmap()">
                <option>Build independent career</option>
                <option>Sign with a label</option>
                <option>Go full-time in music</option>
                <option>Touring artist</option>
                <option>Music producer</option>
              </select>
            </div>
            <div class="goal-input">
              <label>Genre Focus</label>
              <select onchange="updateRoadmap()">
                <option>Afrobeats</option>
                <option>Hip-Hop</option>
                <option>R&B</option>
                <option>Electronic</option>
                <option>Indie</option>
                <option>Pop</option>
              </select>
            </div>
            <div class="goal-input">
              <label>Timeline</label>
              <select>
                <option>12 Months</option>
                <option selected>24 Months</option>
                <option>36 Months</option>
              </select>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;" onclick="updateRoadmap()">⚡ Regenerate</button>
          </div>

          <div class="sidebar-section">
            <h4>Jump to Phase</h4>
            <div class="phase-nav">
              <div class="phase-nav-item active" onclick="scrollToPhase('phase1')"><div class="phase-dot" style="background:var(--gold)"></div>Phase 1 · Foundation</div>
              <div class="phase-nav-item" onclick="scrollToPhase('phase2')"><div class="phase-dot" style="background:var(--teal)"></div>Phase 2 · Growth</div>
              <div class="phase-nav-item" onclick="scrollToPhase('phase3')"><div class="phase-dot" style="background:var(--violet)"></div>Phase 3 · Breakthrough</div>
            </div>
          </div>

          <div class="sidebar-section">
            <h4>Overall Progress</h4>
            <div style="font-family:var(--font-d);font-size:3rem;font-weight:700;color:var(--gold);" id="overallPct">0%</div>
            <div style="font-family:var(--font-m);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.8rem;">Milestones complete</div>
            <div class="progress-bar"><div class="progress-fill" id="overallBar" style="width:0%"></div></div>
            <div style="font-family:var(--font-m);font-size:0.65rem;color:var(--muted);margin-top:0.8rem;line-height:1.6;" id="progressMsg">Click milestones to mark them complete.</div>
          </div>
        </aside>

        <!-- TIMELINE -->
        <main class="timeline" id="timeline"></main>
      </div>
    </div>
  </div>

  <script src="shared1.0.js"></script>
  <script>
    const roadmapData = [
      {
        id: 'phase1',
        num: 'Phase 01',
        title: 'Foundation & Identity',
        period: 'Months 1–6',
        color: 'var(--gold)',
        revenueTarget: '$2,000 – $5,000 / month',
        milestones: [
          { icon:'🎨', title:'Define Artist Brand', desc:'Lock in visual identity — logo, colour palette, photography style, and brand voice. Commission professional press photos.', kpi:'KPI: Consistent branding across all 5 platforms' },
          { icon:'🎵', title:'Record EP or 3 Singles', desc:'Record, mix, and master your first body of work to a professional standard. Aim for at least one potential sync track.', kpi:'KPI: 3 tracks ready for release' },
          { icon:'📡', title:'Set Up Distribution', desc:'Sign up with DistroKid, TuneCore, or CD Baby. Register with a PRO (ASCAP, BMI, or SAMRO). Get ISRC codes for all tracks.', kpi:'KPI: All tracks distributed on 10+ platforms' },
          { icon:'📱', title:'Content Engine Launch', desc:'Build a 30-day content calendar. Begin posting 5x/week on TikTok and 3x/week on Instagram Reels. Document your journey.', kpi:'KPI: 500 followers on each platform' },
        ],
        actions: [
          'Register with Performing Rights Organisation',
          'Create profiles on all streaming platforms',
          'Shoot professional press photos',
          'Build a basic artist website',
          'Get 100 email list subscribers',
          'Release first single with proper metadata',
        ]
      },
      {
        id: 'phase2',
        num: 'Phase 02',
        title: 'Growth & Momentum',
        period: 'Months 7–18',
        color: 'var(--teal)',
        revenueTarget: '$5,000 – $15,000 / month',
        milestones: [
          { icon:'📈', title:'Reach 10K Monthly Listeners', desc:'Submit to Spotify editorial playlists 7 days before each release. Pitch to independent playlist curators via SubmitHub and Groover.', kpi:'KPI: 10,000 Spotify Monthly Listeners' },
          { icon:'🎤', title:'Tour Readiness', desc:'Book 24+ shows per year. Develop a stage plot and tech rider. Secure at least one festival booking or support slot for a known artist.', kpi:'KPI: 24 shows, 1 festival booking' },
          { icon:'💰', title:'Revenue Diversification', desc:'Launch Patreon or Bandcamp subscription. Add merchandise. Explore session work, teaching, or beat sales as secondary income.', kpi:'KPI: 3 active revenue streams' },
          { icon:'🤝', title:'Industry Partnerships', desc:'Sign with a booking agent. Secure a music lawyer. Build relationships with 3 sync supervisors. Submit music to at least 5 sync libraries.', kpi:'KPI: Booking agent signed, sync library accepted' },
        ],
        actions: [
          'Submit to Spotify editorial playlists',
          'Reach out to 20 playlist curators',
          'Launch Patreon or fan membership',
          'Design and sell at least 2 merch items',
          'Book festival submissions for next season',
          'Pitch to at least 5 sync libraries',
          'Grow email list to 1,000 subscribers',
          'Film a professional music video',
        ]
      },
      {
        id: 'phase3',
        num: 'Phase 03',
        title: 'Breakthrough & Scale',
        period: 'Months 19–36',
        color: 'var(--violet)',
        revenueTarget: '$15,000 – $50,000+ / month',
        milestones: [
          { icon:'🌍', title:'International Market Entry', desc:'Target 2–3 international markets based on streaming data. Identify which countries show organic listener growth. Consider a European or US promo tour.', kpi:'KPI: 3 international markets active' },
          { icon:'🏷️', title:'Label or Partnership Decision', desc:'With leverage built, evaluate major label offers vs. enhanced distribution deals (AWAL, Empire, Amuse). Know your leverage before any negotiation.', kpi:'KPI: Informed decision made with legal counsel' },
          { icon:'📺', title:'Sync & TV Placement', desc:'Land at least one sync placement in a major TV show, film, or advertising campaign. This is a career-defining credibility milestone.', kpi:'KPI: 1 major sync placement secured' },
          { icon:'🚀', title:'Full-Time Artist Status', desc:'Revenue consistently covers all living expenses plus a 6-month business reserve. Team includes manager, booking agent, and publicist.', kpi:'KPI: Full-time income from music' },
        ],
        actions: [
          'Hire a music publicist for major release',
          'Build international booking relationships',
          'Consult entertainment lawyer on deal structures',
          'Apply for artist development grants',
          'Launch a crowdfunding album campaign',
          'Pursue brand sponsorship deals',
          'License masters for sync directly',
          'Build your own management team',
        ]
      }
    ];

    let totalActions = 0;
    let checkedActions = 0;

    function buildTimeline() {
      const tl = document.getElementById('timeline');
      tl.innerHTML = '';
      totalActions = 0; checkedActions = 0;

      roadmapData.forEach(phase => {
        const block = document.createElement('div');
        block.className = 'phase-block';
        block.id = phase.id;

        const milestonesHtml = phase.milestones.map(m => `
          <div class="milestone" onclick="toggleMilestone(this)">
            <div class="milestone-icon">${m.icon}</div>
            <div class="milestone-title">${m.title}</div>
            <div class="milestone-desc">${m.desc}</div>
            <div class="milestone-kpi">${m.kpi}</div>
          </div>
        `).join('');

        const actionsHtml = phase.actions.map(a => {
          totalActions++;
          return `
          <div class="action-item" onclick="toggleAction(this)">
            <div class="action-check"></div>
            <span>${a}</span>
          </div>`;
        }).join('');

        block.innerHTML = `
          <div class="phase-header">
            <div>
              <div class="phase-num">${phase.num}</div>
              <div class="phase-title">${phase.title}</div>
            </div>
            <div class="phase-period">${phase.period}</div>
          </div>
          <div class="milestones">${milestonesHtml}</div>
          <div class="sec-label" style="margin-bottom:0.8rem;">Action Items</div>
          <div class="actions-list">${actionsHtml}</div>
          <div class="rev-target">
            <div class="rev-target-header">
              <div class="rev-target-label">Revenue Target</div>
              <div class="rev-target-val">${phase.revenueTarget}</div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:0%;transition:width 0.8s ease;"></div></div>
          </div>
        `;
        tl.appendChild(block);
      });
      updateProgress();
    }

    function toggleMilestone(el) {
      el.classList.toggle('done');
      updateProgress();
    }

    function toggleAction(el) {
      el.classList.toggle('checked');
      const check = el.querySelector('.action-check');
      check.textContent = el.classList.contains('checked') ? '✓' : '';
      checkedActions = document.querySelectorAll('.action-item.checked').length;
      updateProgress();
    }

    function updateProgress() {
      checkedActions = document.querySelectorAll('.action-item.checked').length;
      const doneMilestones = document.querySelectorAll('.milestone.done').length;
      const totalMilestones = document.querySelectorAll('.milestone').length;
      const overall = Math.round(((checkedActions / totalActions) * 0.5 + (doneMilestones / totalMilestones) * 0.5) * 100);
      document.getElementById('overallPct').textContent = overall + '%';
      document.getElementById('overallBar').style.width = overall + '%';
      document.getElementById('progressMsg').textContent =
        `${doneMilestones}/${totalMilestones} milestones · ${checkedActions}/${totalActions} actions complete`;

      // Update phase revenue bars
      document.querySelectorAll('.rev-target').forEach((rt, i) => {
        const phaseActions = roadmapData[i].actions.length;
        const phaseChecked = [...document.querySelectorAll('.phase-block')[i].querySelectorAll('.action-item.checked')].length;
        const pct = Math.round(phaseChecked / phaseActions * 100);
        rt.querySelector('.progress-fill').style.width = pct + '%';
      });
    }

    function scrollToPhase(id) {
      document.getElementById(id).scrollIntoView({ behavior:'smooth', block:'start' });
      document.querySelectorAll('.phase-nav-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.phase-nav-item').classList.add('active');
    }

    function updateRoadmap() {
      buildTimeline();
    }

    buildTimeline();
  </script>
</body>
</html>
